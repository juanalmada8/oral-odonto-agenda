databases:
  - name: oral-postgres
    plan: starter
    databaseName: oral_db
    user: oral_user

services:
  - type: web
    name: oral-odonto-agenda
    runtime: python
    plan: starter
    buildCommand: pip install -e ".[dev]"
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api/v1
      - key: APP_TIMEZONE
        value: America/Argentina/Buenos_Aires
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: oral-postgres
          property: connectionString
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: EMAIL_FROM
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: REMINDER_HOURS_AHEAD
        value: "24"
